# 프로젝트 기본 정보
project:
  name: "image-prep-worker"
  version: "v0.1.0"

# 경로 설정 (Path Configuration)
paths:
  # 로컬 작업 경로
  local:
    raw_data: "./data/raw"            # 원본 압축파일 저장소
    processed_data: "./data/output"    # 처리 완료된 이미지 저장소
    logs: "./logs"                     # 로그 저장소

  # 클라우드 경로 (GCP)
  cloud:
    bucket_name: "my-food-dataset-bucket"
    input_prefix: "raw-zips/"          # 버킷 내 원본 데이터 위치
    output_prefix: "processed-webp/"   # 버킷 내 결과 저장 위치

# 이미지 처리 설정
processing:
  target_size: [640, 640]
  output_format: "webp"
  quality: 90
  worker_count: 4                      # 멀티프로세싱 워커 수